<body>
  <header>
    <i class="fas fa-dna" style="font-size:2rem;color:#2563eb"></i>
    <h1 id="page-title">转座元件知识图谱演示</h1>
    <div class="actions">
      <span class="badge" id="page-badge">LINE-1 本地图谱子图</span>
      <div class="lang">
        <button id="lang-zh" class="active">中文</button>
        <button id="lang-en">English</button>
      </div>
    </div>
  </header>
  <div class="main">
    <section class="panel">
      <div class="head"><h2 id="graph-title">图谱可视化</h2></div>
      <div class="toolbar">

        <div class="focus-wrap" title="调节点击或搜索节点时的放大程度">
          <label id="focus-label" for="focus-level">聚焦程度</label>
          <input id="focus-level" type="range" min="0" max="100" step="10" value="0">
          <span class="focus-value" id="focus-value">0</span>
        </div>
        <button id="reset-graph"><i class="fas fa-sync-alt"></i> <span id="reset-text">重置</span></button>
      </div>
      <div id="cy"></div>
      <div class="nav" id="search-results-nav"><button id="prev-result"><i class="fas fa-chevron-left"></i></button><span id="result-counter">0/0</span><span id="result-name"></span><button id="next-result"><i class="fas fa-chevron-right"></i></button></div>
      <div class="detail" id="node-details">点击节点或连线查看图谱详情。</div>
    </section>
    <section class="panel">
      <div class="head"><h2 id="qa-title">智能问答演示</h2></div>
      <div class="chat">
        <div class="qa-controls">
          <div class="qa-mode">
            <span class="qa-mode-label" id="qa-mode-label">回答模式</span>
            <div class="segmented" id="style-segmented">
              <button id="mode-simple" class="active" type="button">简单</button>
              <button id="mode-detailed" type="button">详细</button>
            </div>
          </div>
          <div class="qa-mode">
            <span class="qa-mode-label" id="qa-depth-label">回答深度</span>
            <div class="segmented" id="depth-segmented">
              <button id="depth-shallow" class="active" type="button">浅</button>
              <button id="depth-medium" type="button">中</button>
              <button id="depth-deep" type="button">深</button>
            </div>
          </div>
        </div>
        <div class="msgs" id="chat-messages"></div>
        <div class="input"><input id="user-question" type="text" value="LINE-1 相关疾病" placeholder="输入你的问题"><button id="send-question"><i class="fas fa-paper-plane"></i></button></div>
      </div>
    </section>
  </div>
  <footer id="page-footer">演示页使用本地导出的 Neo4j 子图数据，不依赖在线接口。</footer>
  <script src="graph_demo_data.js"></script>

nomes.':'文献：高通量测序揭示个体基因组中人特异性 L1 含量差异','Identification and characterization of occult human-specific LINE-1 insertions using long-read sequencing technology.':'文献：长读长测序鉴定隐匿性人特异性 LINE-1 插入','LINE1 insertions as a genomic risk factor for schizophrenia: Preliminary evidence from an affected family.':'文献：LINE1 插入可能是精神分裂症的基因组风险因素'},en:{'Alu转座':'Alu retrotransposition','L1介导的突变':'L1-mediated mutation','双链断裂':'double-strand break','异位重组':'ectopic recombination','微卫星产生':'microsatellite generation','插入突变':'insertional mutagenesis','逆转录转座':'retrotransposition','逆转录转座子动员':'retrotransposon mobilization','逆转录转座机制':'retrotransposition mechanism','脑癌':'brain cancer','血癌':'blood cancer','类风湿关节炎':'rheumatoid arthritis','阿尔茨海默病':"Alzheimer's disease",'亨廷顿病':"Huntington's Disease",'唐氏综合征':'Down syndrome','Rett 综合征':'Rett syndrome','Rotor 综合征':'Rotor syndrome','自闭症谱系障碍':'autism spectrum disorder','口腔鳞状细胞癌':'Oral Squamous Cell Carcinoma','共济失调毛细血管扩张症':'ataxia telangiectasia','β-地中海贫血':'beta-thalassemia','孟德尔遗传病':'Mendelian disease','干扰素相关自身免疫性疾病':'IFN-based autoimmune diseases',"3' 转导":"3' transduction","5' 和 3' 转导":"5' and 3' transduction","5' UTR 活性":"5' UTR activity",'A-tail 扩展':'A-tail extension','6-甲酰基吲哚[3,2-b]咔唑 (FICZ) 诱导长散布核元件-1 (L1) 逆转录转座':'FICZ induces LINE-1 retrotransposition'}};

        const refs=demoData.qa.line1_papers || [];
        return currentAnswerStyle==='detailed'
          ? buildDetailed(currentLang==='zh' ? '当前本地图谱已经整理出与 LINE-1 相关的核心文献，可用于支撑疾病、功能和谱系层面的解释。':'The current local graph already contains core literature evidence associated with LINE-1.', refs, refs, 6, 8)
          : `${intro}${ui[currentLang].pp}${makeRef(refs.slice(0,5))}`;
      }

      return currentAnswerStyle==='detailed'
        ? (currentLang==='zh'
          ? `${intro}## 结论\n当前本地演示图支持围绕 LINE-1 的疾病、功能、谱系关系与文献证据问答。\n\n## 机制与关系解释\n- 你可以直接询问“LINE-1 相关疾病”“LINE-1 相关功能”。\n- 也可以询问“L1HS 和 LINE-1 是什么关系”。\n- 若需要证据，可继续追问文献支持情况。\n\n## 证据与文献\n当前回答来自本地演示图；更完整答案以后端知识检索与大模型生成结果为准。\n\n## 局限与说明\n- 这是本地回退回答，不代表完整数据库检索结果。\n- 当后端恢复后，详细模式会返回更完整的证据化回答。`
          : `${intro}## Conclusion\nThe current local demo graph supports questions about LINE-1 diseases, functions, lineage relations, and literature evidence.\n\n## Mechanistic Interpretation\n- You can ask about LINE-1-related diseases or functions.\n- You can also ask how L1HS is related to LINE-1.\n- Literature evidence can be expanded when needed.\n\n## Evidence and References\nThis answer comes from the local demo graph; the full backend retrieval pipeline can provide richer evidence.\n\n## Limitations\n- This is a local fallback answer rather than the full retrieval result.\n- Detailed mode becomes richer when backend retrieval succeeds.`)
        : `${intro}${ui[currentLang].fallback}`;
    }
    function formatBackendAnswer(result){
      const styleLabel=currentLang==='zh'?(result.answer_style==='detailed'?'详细模式':'简单模式'):(result.answer_style==='detailed'?'Detailed mode':'Brief mode');
      const depthLabel=currentLang==='zh'
        ? ({shallow:'浅',medium:'中',deep:'深'}[result.answer_depth] || '浅')
        : ({shallow:'Shallow',medium:'Medium',deep:'Deep'}[result.answer_depth] || 'Shallow');
      const prefix = currentLang==='zh'
        ? `> ${styleLabel} · 回答深度：${depthLabel}\n\n`
        : `> ${styleLabel} · Depth: ${depthLabel}\n\n`;
      return `${prefix}${result.answer||ui[currentLang].fallback}`;
    }
    async function answerWithBackend(question){const res=await fetch('api/qa.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question,language:currentLang,answer_style:currentAnswerStyle,answer_depth:currentAnswerDepth})}); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.error||'Backend request failed'); return formatBackendAnswer(data);}
    cy.on('tap','node',async e => {
      const node = e.target;
      try{
        await loadDynamicGraph(node.data('pmid') || node.data('label'));
      }catch(_err){
        focus(node);
      }
    }); cy.on('tap','edge',e => {clearHighlights(); const edge=e.target; const connected=edge.connectedNodes(); const others=cy.nodes().difference(connected); const otherEdges=cy.edges().difference(edge); others.addClass('dimmed'); otherEdges.addClass('edge-dimmed'); connected.addClass('neighbor'); edge.addClass('focus-edge'); showEdge(edge)}); cy.on('tap',e => { if(e.target===cy){clearHighlights(); nodeDetails.textContent=ui[currentLang].empty;} });
    searchInput.addEventListener('input', handleSearch); searchInput.addEventListener('keydown',async e=>{if(e.key==='Enter'){e.preventDefault(); try{await loadDynamicGraph(searchInput.value.trim());}catch(err){nodeDetails.textContent = err && err.message ? err.message : ui[currentLang].empty;}}}); prevBtn.addEventListener('click',()=>{if(currentResultIndex>0){currentResultIndex-=1; updateNav();}}); nextBtn.addEventListener('click',()=>{if(currentResultIndex<searchResults.length-1){currentResultIndex+=1; updateNav();}}); el('focus-level').addEventListener('input',e=>{focusLevel=Number(e.target.value)||0; updateFocusUi(); if(searchResults.length>0&&searchResults[currentResultIndex]) focus(searchResults[currentResultIndex]);});
    el('reset-graph').addEventListener('click',()=>{restoreInitialGraph();});
    sendBtn.addEventListener('click',async()=>{const q=userInput.value.trim(); if(!q) return; addMessage(q,'user'); userInput.value=''; const loading=addMessage(currentLang==='zh'?'正在检索图数据库并生成回答…':'Retrieving graph evidence and generating the answer…','assistant'); try{const answer=await answerWithBackend(q); loading.remove(); addMessage(answer,'assistant');}catch(err){loading.remove(); const prefix=currentLang==='zh'?'后端暂未连通，当前已回退到本地规则回答。<div class="ref">':'Backend unavailable. The UI has fallen back to local rule-based answering.<div class="ref">'; const suffix=`${err && err.message ? err.message : 'unknown error'}</div>`; setTimeout(()=>addMessage(prefix + suffix + answerLocal(q),'assistant'),120);}});
    userInput.addEventListener('keypress',e => { if(e.key==='Enter') sendBtn.click(); });
    document.addEventListener('click',e => { if(e.target && e.target.id==='mode-simple') setAnswerStyle('simple'); if(e.target && e.target.id==='mode-detailed') setAnswerStyle('detailed'); if(e.target && e.target.id==='depth-shallow') setAnswerDepth('shallow'); if(e.target && e.target.id==='depth-medium') setAnswerDepth('medium'); if(e.target && e.target.id==='depth-deep') setAnswerDepth('deep'); });
    el('lang-zh').addEventListener('click',()=>{currentLang='zh'; setUi();}); el('lang-en').addEventListener('click',()=>{currentLang='en'; setUi();});
    cy.on('layoutstop',()=>{refineGraphLayout(); cy.fit(undefined,55);}); repairModeControls(); setAnswerStyle('simple'); setUi(); el('focus-level').value=String(focusLevel); restoreInitialGraph();
  </script>
</body>
</html>
