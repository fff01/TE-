<body>
  <header>

  <div class="main">
    <section class="panel">

      </div>
    </section>
  </div>
  <footer id="page-footer">演示页使用本地导出的 Neo4j 子图数据，不依赖在线接口。</footer>

'This paper reports that FICZ can induce LINE-1 retrotransposition.'}};

    function getDesc(name,type){if(descMap[currentLang][name]) return descMap[currentLang][name]; if(type==='TE') return currentLang==='zh' ? `${getName(name,type)} 是图谱中的转座元件节点，用于连接谱系、功能、疾病和文献证据。` : `${getName(name,type)} is a transposable element node used to connect lineage, function, disease, and literature evidence in the graph.`; if(type==='Function') return currentLang==='zh' ? `${getName(name,type)} 是图谱中的功能/机制节点。` : `${getName(name,type)} is a function or mechanism node in the current graph.`; if(type==='Disease') return currentLang==='zh' ? `${getName(name,type)} 是图谱中的疾病节点。` : `${getName(name,type)} is a disease node in the current graph.`; if(type==='Paper') return currentLang==='zh' ? '该节点表示支持当前知识关系的文献证据。' : 'This node represents a literature record supporting the current graph knowledge.'; return '';}
    function buildLayout(){return{name:'cose',fit:true,padding:75,randomize:true,animate:false,nodeDimensionsIncludeLabels:true,componentSpacing:180,nestingFactor:.9,gravity:45,numIter:1800,initialTemp:220,coolingFactor:.96,minTemp:1,idealEdgeLength:edge=>{const rel=edge.data('relation')||''; if(rel==='SUBFAMILY_OF') return 170; if(rel==='EVIDENCE_RELATION') return 240; return 210;},edgeElasticity:edge=>{const rel=edge.data('relation')||''; return rel==='EVIDENCE_RELATION'?40:90;},nodeRepulsion:node=>{const type=node.data('type')||''; return type==='Paper'?GRAPH_TUNING.evidenceNodeRepulsion:(type==='Disease'||type==='Function'?GRAPH_TUNING.diseaseFunctionRepulsion:GRAPH_TUNING.teNodeRepulsion);}}}
    const cy = cytoscape({container:el('cy'),elements:demoData.elements,style:[{selector:'node',style:{'label':e=>getName(e.data('label'),e.data('type')),'font-size':'11px','min-zoomed-font-size':9,'text-valign':'center','text-halign':'center','background-color':e=>getTypeColor(e.data('type')),'color':'#0f172a','text-outline-width':3,'text-outline-color':'#fff','width':'label','height':'label','padding':'14px','text-wrap':'wrap','text-max-width':150,'border-width':2,'border-color':'#fff','shape':'round-rectangle'}},{selector:'edge',style:{'width':2,'line-color':'#cbd5e1','target-arrow-color':'#64748b','target-arrow-shape':'triangle','curve-style':'bezier','control-point-step-size':55,'label':e=>{const rel=e.data('relation')||''; return rel==='EVIDENCE_RELATION'?'':getRel(rel)},'font-size':'9px','min-zoomed-font-size':8,'text-rotation':'autorotate','color':'#334155','text-background-color':'rgba(255,255,255,0.92)','text-background-opacity':1,'text-background-padding':'2px','text-outline-width':0}},{selector:'.highlight',style:{'border-width':6,'border-color':'#0f172a','font-weight':'800','overlay-color':'#2563eb','overlay-opacity':0.12,'overlay-padding':'16px','shadow-blur':18,'shadow-color':'#2563eb','shadow-opacity':0.35,'shadow-offset-x':0,'shadow-offset-y':0,'z-index':999}},{selector:'.neighbor',style:{'border-width':4,'border-color':'#60a5fa','overlay-color':'#93c5fd','overlay-opacity':0.03,'overlay-padding':'6px','opacity':GRAPH_TUNING.neighborOpacity,'shadow-blur':4,'shadow-color':'#93c5fd','shadow-opacity':0.08}},{selector:'.dimmed',style:{'opacity':GRAPH_TUNING.dimmedOpacity}},{selector:'.focus-edge',style:{'label':e=>getRel(e.data('relation')),'width':4,'line-color':'#2563eb','target-arrow-color':'#2563eb','font-size':'11px','color':'#0f172a','text-background-color':'rgba(255,255,255,0.98)','text-background-opacity':1,'text-background-padding':'4px','opacity':0.95}},{selector:'.edge-dimmed',style:{'opacity':0.28}}],layout:buildLayout(),wheelSensitivity:.2});
    function renderIntro(){chatMessages.innerHTML=''; addMessage(ui[currentLang].intro,'assistant')}
    function repairModeControls(){const host=document.querySelector('.segmented'); if(host){host.innerHTML='<button id="mode-simple" class="active" type="button">简单</button><button id="mode-detailed" type="button">详细</button>';}}
    function updateAnswerModeUi(){const modeSimpleBtn=el('mode-simple'), modeDetailedBtn=el('mode-detailed'); el('qa-mode-label').textContent=currentLang==='zh'?'回答模式':'Answer mode'; if(modeSimpleBtn&&modeDetailedBtn){modeSimpleBtn.textContent=currentLang==='zh'?'简单':'Brief'; modeDetailedBtn.textContent=currentLang==='zh'?'详细':'Detailed'; modeSimpleBtn.classList.toggle('active', currentAnswerStyle==='simple'); modeDetailedBtn.classList.toggle('active', currentAnswerStyle==='detailed');}}
    function updateFocusUi(){el('focus-label').textContent=ui[currentLang].focus; el('focus-value').textContent=String(focusLevel);}
    function setAnswerStyle(style){currentAnswerStyle=style==='detailed'?'detailed':'simple'; updateAnswerModeUi();}
    function setUi(){document.documentElement.lang=currentLang==='zh'?'zh-CN':'en'; el('page-title').textContent=ui[currentLang].pageTitle; el('page-badge').textContent=ui[currentLang].badge; el('graph-title').textContent=ui[currentLang].graphTitle; el('qa-title').textContent=ui[currentLang].qaTitle; el('page-footer').textContent=ui[currentLang].footer; el('reset-text').textContent=ui[currentLang].reset; searchInput.placeholder=ui[currentLang].search; userInput.placeholder=ui[currentLang].ph; if(!userInput.value || userInput.value===ui.zh.q || userInput.value===ui.en.q) userInput.value=ui[currentLang].q; el('lang-zh').classList.toggle('active', currentLang==='zh'); el('lang-en').classList.toggle('active', currentLang==='en'); updateAnswerModeUi(); updateFocusUi(); if(searchResults.length===0) nodeDetails.textContent=ui[currentLang].empty; else showNode(searchResults[currentResultIndex]); renderIntro(); cy.style().update(); updateNav();}
    function showNode(node){const raw=node.data('label'), type=node.data('type') || 'Unknown'; nodeDetails.innerHTML=`<strong>${getName(raw,type)}</strong> (${getType(type)})<br>${getDesc(raw,type)}<div class="meta">${ui[currentLang].orig}: ${raw} | ${ui[currentLang].deg}: ${node.degree()}</div>`}
    function showEdge(edge){const s=getName(edge.source().data('label'),edge.source().data('type')), t=getName(edge.target().data('label'),edge.target().data('type')), ev=edge.data('evidence') || ui[currentLang].none; nodeDetails.innerHTML=`<strong>${s}</strong> → ${getRel(edge.data('relation'))} → <strong>${t}</strong><br>${ui[currentLang].evi}: ${ev}`;}
    function clearHighlights(){cy.nodes().removeClass('highlight neighbor dimmed'); cy.edges().removeClass('focus-edge edge-dimmed')}
    function getTargetZoom(level){return 1 + (level/10)*GRAPH_TUNING.focusZoomStep}
    function getGraphCenter(){
      const line1=cy.nodes().filter(n=>n.data('label')==='LINE-1')[0];
      if(line1) return {...line1.position()};
      const nodes=cy.nodes();
      if(nodes.length===0) return {x:0,y:0};
      let sx=0, sy=0;
      nodes.forEach(n=>{sx+=n.position('x'); sy+=n.position('y');});
      return {x:sx/nodes.length, y:sy/nodes.length};
    }
    function pushPaperNodesOutward(){
      const center=getGraphCenter();
      const nonPaper=cy.nodes().filter(n=>n.data('type')!=='Paper');
      let maxRadius=0;
      nonPaper.forEach(n=>{
        const p=n.position();
        maxRadius=Math.max(maxRadius, Math.hypot(p.x-center.x, p.y-center.y));
      });
      const paperNodes=cy.nodes().filter(n=>n.data('type')==='Paper');
      const baseRadius=maxRadius + GRAPH_TUNING.paperOuterOffset;
      paperNodes.forEach((node,index)=>{
        const p=node.position();
        let dx=p.x-center.x, dy=p.y-center.y;
        let angle=Math.atan2(dy,dx);
        if(!Number.isFinite(angle) || (dx===0 && dy===0)) angle=(Math.PI*2*index)/Math.max(paperNodes.length,1);
        const radius=Math.max(baseRadius, Math.hypot(dx,dy) + GRAPH_TUNING.paperOuterOffset*0.6);
        node.position({
          x:center.x + Math.cos(angle)*radius,
          y:center.y + Math.sin(angle)*radius
        });
      });
    }
    function resolveNodeOverlaps(){
      const nodes=cy.nodes().toArray();
      const center=getGraphCenter();
      for(let iter=0; iter<GRAPH_TUNING.overlapIterations; iter+=1){
        let moved=false;
        for(let i=0;i<nodes.length;i+=1){
          for(let j=i+1;j<nodes.length;j+=1){
            const a=nodes[i], b=nodes[j];
            const boxA=a.boundingBox({includeLabels:true, includeOverlays:false});
            const boxB=b.boundingBox({includeLabels:true, includeOverlays:false});
            const overlapX=Math.min(boxA.x2,boxB.x2)-Math.max(boxA.x1,boxB.x1);
            const overlapY=Math.min(boxA.y2,boxB.y2)-Math.max(boxA.y1,boxB.y1);
            if(overlapX<=0 || overlapY<=0) continue;
            moved=true;
            let dx=b.position('x')-a.position('x');
            let dy=b.position('y')-a.position('y');
            if(dx===0 && dy===0){
              dx=(Math.random()-.5)||0.5;
              dy=(Math.random()-.5)||0.5;
            }
            const len=Math.hypot(dx,dy) || 1;
            const ux=dx/len, uy=dy/len;
            const shift=(Math.min(overlapX,overlapY)/2)+GRAPH_TUNING.overlapPadding;
            const aIsPaper=a.data('type')==='Paper', bIsPaper=b.data('type')==='Paper';
            const aWeight=aIsPaper?0.35:0.5;
            const bWeight=bIsPaper?0.65:0.5;
            a.position({x:a.position('x')-ux*shift*aWeight,y:a.position('y')-uy*shift*aWeight});
            b.position({x:b.position('x')+ux*shift*bWeight,y:b.position('y')+uy*shift*bWeight});
            if(aIsPaper){
              const ap=a.position();
              const adx=ap.x-center.x, ady=ap.y-center.y;
              const alen=Math.hypot(adx,ady)||1;
              a.position({x:ap.x+(adx/alen)*8,y:ap.y+(ady/alen)*8});
            }
            if(bIsPaper){
              const bp=b.position();
              const bdx=bp.x-center.x, bdy=bp.y-center.y;
              const blen=Math.hypot(bdx,bdy)||1;
              b.position({x:bp.x+(bdx/blen)*8,y:bp.y+(bdy/blen)*8});
            }
          }
        }
        if(!moved) break;
      }
    }
    function refineGraphLayout(){
      pushPaperNodesOutward();
      resolveNodeOverlaps();
    }
    function focus(node){clearHighlights(); const neighborhood=node.closedNeighborhood(); const others=cy.elements().difference(neighborhood); others.nodes().addClass('dimmed'); others.edges().addClass('edge-dimmed'); node.addClass('highlight'); node.neighborhood('node').addClass('neighbor'); node.connectedEdges().addClass('focus-edge'); showNode(node); if(focusLevel===0){cy.fit(node.closedNeighborhood(),80);} else {const zoom=Math.min(cy.maxZoom(), getTargetZoom(focusLevel)); cy.animate({center:{eles:node},zoom,duration:280});}}
    function updateNav(){if(searchResults.length===0){nav.style.display='none'; clearHighlights(); return;} const n=searchResults[currentResultIndex]; nav.style.display='flex'; resultCounter.textContent=`${currentResultIndex+1}/${searchResults.length}`; resultName.textContent=`${getName(n.data('label'),n.data('type'))} (${getType(n.data('type'))})`; prevBtn.disabled=currentResultIndex===0; nextBtn.disabled=currentResultIndex===searchResults.length-1; focus(n)}
    function handleSearch(){const keyword=searchInput.value.trim().toLowerCase(); if(!keyword){searchResults=[]; currentResultIndex=-1; updateNav(); nodeDetails.textContent=ui[currentLang].empty; return;} searchResults=cy.nodes().filter(n => `${n.data('label')} ${getName(n.data('label'),n.data('type'))}`.toLowerCase().includes(keyword)).toArray(); currentResultIndex=searchResults.length>0?0:-1; updateNav()}
    function escapeHtml(text){const div=document.createElement('div'); div.textContent=text; return div.innerHTML;}
    function renderBubbleContent(text,sender){if(sender==='user') return escapeHtml(text).replace(/\n/g,'<br>'); if(window.marked){marked.setOptions({breaks:true,gfm:true}); return marked.parse(text);} return text.replace(/\n/g,'<br>');}
    function addMessage(text,sender){const m=document.createElement('div'); m.className=`msg ${sender}`; m.innerHTML=`<div class="avatar"><i class="fas ${sender==='user'?'fa-user':'fa-robot'}"></i></div><div class="bubble">${renderBubbleContent(text,sender)}</div>`; chatMessages.appendChild(m); chatMessages.scrollTop=chatMessages.scrollHeight; return m}
    function makeRef(items){if(!items || items.length===0) return `<div class="ref">${ui[currentLang].noneLocal}</div>`; return `<div class="ref"><strong>${ui[currentLang].ref}:</strong><br>${items.map(i => `${getName(i.name, inferType(i.name))}${(i.pmids||[]).length ? ` (PMID: ${(i.pmids||[]).join(', ')})` : ''}`).join('<br>')}</div>`}
    function answerLocal(q){const modeLabel=currentLang==='zh'?(currentAnswerStyle==='detailed'?'详细模式':'简单模式'):(currentAnswerStyle==='detailed'?'Detailed mode':'Brief mode'); const intro=`<blockquote>${modeLabel}</blockquote>`; q=q.toLowerCase(); const askFunc=q.includes('line-1') && (q.includes('功能')||q.includes('机制')||q.includes('作用')||q.includes('function')||q.includes('mechanism')); const askDis=q.includes('line-1') && (q.includes('疾病')||q.includes('病')||q.includes('disease')||q.includes('cancer')); const askL1hs=q.includes('l1hs') && (q.includes('文献')||q.includes('证据')||q.includes('论文')||q.includes('paper')||q.includes('evidence')); const askL1=q.includes('line-1') && (q.includes('文献')||q.includes('证据')||q.includes('论文')||q.includes('paper')||q.includes('evidence')); if(askFunc){const items=demoData.qa.line1_functions||[]; const limit=currentAnswerStyle==='detailed'?8:5; const s=items.slice(0,limit).map(i => `${getRel(i.predicate)} ${getName(i.name, inferType(i.name))}`).join(currentLang==='zh'?'；':'; '); return `${intro}${ui[currentLang].f}${s || ui[currentLang].no}${makeRef(items.slice(0,limit))}`;} if(askDis){const items=demoData.qa.line1_diseases||[]; const limit=currentAnswerStyle==='detailed'?8:5; const s=items.slice(0,limit).map(i => `${getRel(i.predicate)} ${getName(i.name, inferType(i.name))}`).join(currentLang==='zh'?'；':'; '); return `${intro}${ui[currentLang].d}${s || ui[currentLang].no}${makeRef(items.slice(0,limit))}`;} if(askL1hs) return `${intro}${ui[currentLang].lp}${makeRef(demoData.qa.l1hs_papers||[])}`; if(askL1) return `${intro}${ui[currentLang].pp}${makeRef(demoData.qa.line1_papers||[])}`; return `${intro}${ui[currentLang].fallback}`}
    function formatBackendAnswer(result){const styleLabel=currentLang==='zh'?(result.answer_style==='detailed'?'详细模式':'简单模式'):(result.answer_style==='detailed'?'Detailed mode':'Brief mode'); return `> ${styleLabel}\n\n${result.answer||ui[currentLang].fallback}`;}
    async function answerWithBackend(question){const res=await fetch('api/qa.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question,language:currentLang,answer_style:currentAnswerStyle})}); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.error||'Backend request failed'); return formatBackendAnswer(data);}
    cy.on('tap','node',e => focus(e.target)); cy.on('tap','edge',e => {clearHighlights(); const edge=e.target; const connected=edge.connectedNodes(); const others=cy.nodes().difference(connected); const otherEdges=cy.edges().difference(edge); others.addClass('dimmed'); otherEdges.addClass('edge-dimmed'); connected.addClass('neighbor'); edge.addClass('focus-edge'); showEdge(edge)}); cy.on('tap',e => { if(e.target===cy){clearHighlights(); nodeDetails.textContent=ui[currentLang].empty;} });
    searchInput.addEventListener('input', handleSearch); prevBtn.addEventListener('click',()=>{if(currentResultIndex>0){currentResultIndex-=1; updateNav();}}); nextBtn.addEventListener('click',()=>{if(currentResultIndex<searchResults.length-1){currentResultIndex+=1; updateNav();}}); el('focus-level').addEventListener('input',e=>{focusLevel=Number(e.target.value)||0; updateFocusUi(); if(searchResults.length>0&&searchResults[currentResultIndex]) focus(searchResults[currentResultIndex]);});
    el('reset-graph').addEventListener('click',()=>{clearHighlights(); focusLevel=0; el('focus-level').value='0'; updateFocusUi(); cy.layout(buildLayout()).run();});
    sendBtn.addEventListener('click',async()=>{const q=userInput.value.trim(); if(!q) return; addMessage(q,'user'); userInput.value=''; const loading=addMessage(currentLang==='zh'?'正在检索图数据库并生成回答…':'Retrieving graph evidence and generating the answer…','assistant'); try{const answer=await answerWithBackend(q); loading.remove(); addMessage(answer,'assistant');}catch(err){loading.remove(); const prefix=currentLang==='zh'?'后端暂未连通，当前已回退到本地规则回答。<div class="ref">':'Backend unavailable. The UI has fallen back to local rule-based answering.<div class="ref">'; const suffix=`${err && err.message ? err.message : 'unknown error'}</div>`; setTimeout(()=>addMessage(prefix + suffix + answerLocal(q),'assistant'),120);}});
    userInput.addEventListener('keypress',e => { if(e.key==='Enter') sendBtn.click(); });
    document.addEventListener('click',e => { if(e.target && e.target.id==='mode-simple') setAnswerStyle('simple'); if(e.target && e.target.id==='mode-detailed') setAnswerStyle('detailed'); });
    el('lang-zh').addEventListener('click',()=>{currentLang='zh'; setUi();}); el('lang-en').addEventListener('click',()=>{currentLang='en'; setUi();});
    cy.on('layoutstop',()=>{refineGraphLayout(); cy.fit(undefined,55);}); repairModeControls(); setAnswerStyle('simple'); setUi(); el('focus-level').value=String(focusLevel); if(cy.nodes().length>0) focus(cy.nodes()[0]);
  </script>
