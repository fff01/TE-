<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>转座元件知识图谱演示</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.25.0/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef4fb,#f9fbfe);min-height:100vh;color:#1e293b;display:flex;flex-direction:column}
    header{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;background:rgba(255,255,255,.92);border-bottom:1px solid #dbe7f3}
    h1{font-size:1.5rem}.actions{margin-left:auto;display:flex;gap:.8rem;align-items:center}.badge{background:#e0f2fe;color:#075985;border-radius:999px;padding:.35rem .9rem;font-size:.85rem;font-weight:600}
    .lang{display:flex;gap:.35rem;background:#eff6ff;border:1px solid #dbeafe;border-radius:999px;padding:.2rem}.lang button{border:none;background:transparent;padding:.45rem .9rem;border-radius:999px;cursor:pointer;font-weight:700;color:#1e3a8a}.lang button.active{background:#2563eb;color:#fff}
    .main{flex:1;display:grid;grid-template-columns:minmax(0,2.1fr) minmax(320px,.95fr);gap:1rem;padding:1rem;min-height:0}
    .panel{background:#fff;border:1px solid #dbe7f3;border-radius:20px;box-shadow:0 10px 30px rgba(15,23,42,.06);overflow:hidden;min-height:0;height:calc(100vh - 122px);display:flex;flex-direction:column}
    .head{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.25rem;min-height:78px;border-bottom:1px solid #e7eef7}.head h2{font-size:1.3rem}
    .toolbar{display:flex;gap:.75rem;padding:.9rem 1.25rem;border-bottom:1px solid #e7eef7;align-items:center;flex-wrap:wrap}.search{flex:1;min-width:220px;display:flex;align-items:center;gap:.5rem;border:1px solid #d8e4f0;border-radius:999px;padding:.2rem .9rem;background:#f8fbff}.search input{width:100%;border:none;background:transparent;outline:none;padding:.55rem 0}
    .focus-wrap{display:flex;align-items:center;gap:.65rem;padding:.45rem .85rem;border:1px solid #d8e4f0;border-radius:999px;background:#f8fbff;color:#475569}
    .focus-wrap label{font-size:.86rem;font-weight:600;white-space:nowrap}
    .focus-wrap input[type=range]{width:120px}
    .focus-value{min-width:2.2rem;text-align:center;font-size:.82rem;font-weight:700;color:#1e3a8a}
    button{border:none;border-radius:999px;background:#e7eef7;color:#1e293b;padding:.7rem 1rem;cursor:pointer;font-weight:600}
    #cy{flex:1;min-height:0;background:radial-gradient(circle at top,#fff,#f6faff)}
    .nav{display:none;align-items:center;gap:.8rem;padding:.75rem 1.25rem;border-top:1px solid #e7eef7;background:#f8fbff}.nav button{width:34px;height:34px;padding:0;border-radius:50%}
    .detail{padding:1rem 1.25rem;border-top:1px solid #e7eef7;background:#fbfdff;min-height:108px;font-size:.92rem;line-height:1.6}.meta{color:#64748b;font-size:.84rem;margin-top:.25rem}
    .chat{height:calc(100% - 79px);display:flex;flex-direction:column;min-height:0;flex:1}.msgs{flex:1;padding:1rem;display:flex;flex-direction:column;gap:.9rem;overflow-y:auto;background:#f7faff;min-height:0}
    .qa-controls{display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.8rem 1rem;border-bottom:1px solid #e7eef7;background:#f8fbff;flex-wrap:wrap}
    .qa-mode{display:flex;align-items:center;gap:.7rem}
    .qa-mode-label{font-size:.9rem;color:#475569;font-weight:600}
    .segmented{display:inline-flex;padding:.2rem;border:1px solid #dbeafe;border-radius:999px;background:#eff6ff;gap:.2rem}
    .segmented button{background:transparent;color:#1e3a8a;padding:.45rem .9rem;min-width:76px}
    .segmented button.active{background:#2563eb;color:#fff}
    .custom-editor{display:none;flex:1;min-height:0;padding:1rem;background:#f7faff}
    .custom-editor.active{display:flex;flex-direction:column;gap:1rem}
    .custom-editor-card{flex:1;display:flex;flex-direction:column;min-height:0;background:#fff;border:1px solid #dbe7f3;border-radius:20px;padding:1.2rem 1.25rem;box-shadow:0 6px 20px rgba(15,23,42,.04)}
    .custom-editor-title{font-size:1.05rem;font-weight:800;color:#1e293b;margin-bottom:.35rem}
    .custom-editor-help{font-size:.86rem;color:#64748b;line-height:1.7;margin-bottom:.85rem}
    .custom-editor textarea{flex:1;min-height:240px;border:1px solid #d8e4f0;border-radius:16px;padding:1rem 1.05rem;outline:none;font:inherit;line-height:1.65;resize:none;background:#fbfdff}
    .custom-editor-actions{display:flex;justify-content:flex-end;gap:.75rem}
    .custom-editor-actions button{padding:.75rem 1.15rem}
    .custom-editor-actions .secondary{background:#e7eef7;color:#1e293b}
    .custom-editor-actions .primary{background:#2563eb;color:#fff}
    .msg{display:flex;gap:.75rem;max-width:92%}.msg.user{align-self:flex-end;flex-direction:row-reverse}.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#dbe7f3;flex-shrink:0}.msg.user .avatar{background:#2563eb;color:#fff}
    .bubble{background:#fff;border-radius:18px;padding:.85rem 1rem;line-height:1.6;box-shadow:0 3px 12px rgba(15,23,42,.05)}.msg.user .bubble{background:#2563eb;color:#fff}
    .bubble p{margin:.2rem 0 .7rem}.bubble p:last-child{margin-bottom:0}.bubble ul,.bubble ol{margin:.35rem 0 .8rem 1.2rem}.bubble li{margin:.18rem 0}.bubble strong{font-weight:700}.bubble h1,.bubble h2,.bubble h3,.bubble h4{font-size:1rem;margin:.4rem 0 .65rem}.bubble code{background:#e2e8f0;padding:.08rem .35rem;border-radius:6px;font-family:Consolas,monospace}.bubble pre{background:#0f172a;color:#e2e8f0;padding:.8rem;border-radius:12px;overflow:auto;margin:.7rem 0}.bubble pre code{background:transparent;padding:0;color:inherit}
    .ref{margin-top:.65rem;padding-left:.7rem;border-left:3px solid #94a3b8;color:#475569;font-size:.82rem}.msg.user .ref{color:#dbeafe;border-left-color:#bfdbfe}
    .input{display:flex;gap:.75rem;padding:1.1rem 1rem 1.2rem;border-top:1px solid #e7eef7;background:#fbfdff;min-height:96px;align-items:center;flex-shrink:0}.input input{flex:1;border:1px solid #d8e4f0;border-radius:999px;padding:1rem 1.15rem;outline:none;font-size:1rem;min-height:56px}.input button{width:56px;height:56px;border-radius:50%;background:#2563eb;color:#fff;padding:0}
    footer{padding:.8rem;text-align:center;color:#64748b;font-size:.85rem}
    @media (max-width:960px){.main{grid-template-columns:1fr}.panel{height:auto;min-height:560px}#cy{min-height:520px}header{align-items:flex-start;flex-wrap:wrap}.actions{margin-left:0;width:100%;justify-content:space-between}}
  </style>
</head>
<body>
  <header>
    <i class="fas fa-dna" style="font-size:2rem;color:#2563eb"></i>
    <h1 id="page-title">转座元件知识图谱演示</h1>
    <div class="actions">
      <span class="badge" id="page-badge">LINE-1 本地图谱子图</span>
      <div class="lang">
        <button id="lang-zh" class="active">中文</button>
        <button id="lang-en">English</button>
      </div>
    </div>
  </header>
  <div class="main">
    <section class="panel">
      <div class="head"><h2 id="graph-title">图谱可视化</h2></div>
      <div class="toolbar">
        <div class="search"><i class="fas fa-search" style="color:#64748b"></i><input id="node-search" type="text" placeholder="搜索 LINE-1、L1HS、疾病或功能"></div>
        <div class="focus-wrap" title="调节点击或搜索节点时的放大程度">
          <label id="focus-label" for="focus-level">聚焦程度</label>
          <input id="focus-level" type="range" min="0" max="100" step="10" value="0">
          <span class="focus-value" id="focus-value">0</span>
        </div>
        <button id="toggle-fixed-view" type="button"><span id="fixed-view-text">固定视图：关</span></button>
        <button id="reset-graph"><i class="fas fa-sync-alt"></i> <span id="reset-text">重置</span></button>
      </div>
      <div id="cy"></div>
      <div class="nav" id="search-results-nav"><button id="prev-result"><i class="fas fa-chevron-left"></i></button><span id="result-counter">0/0</span><span id="result-name"></span><button id="next-result"><i class="fas fa-chevron-right"></i></button></div>
      <div class="detail" id="node-details">点击节点或连线查看图谱详情。</div>
    </section>
    <section class="panel">
      <div class="head"><h2 id="qa-title">智能问答演示</h2></div>
      <div class="chat">
        <div class="qa-controls">
          <div class="qa-mode">
            <span class="qa-mode-label" id="qa-mode-label">回答模式</span>
            <div class="segmented" id="style-segmented">
              <button id="mode-simple" class="active" type="button">简单</button>
              <button id="mode-detailed" type="button">详细</button>
              <button id="mode-custom" type="button">自定义</button>
            </div>
          </div>
          <div class="qa-mode">
            <span class="qa-mode-label" id="qa-depth-label">回答深度</span>
            <div class="segmented" id="depth-segmented">
              <button id="depth-shallow" class="active" type="button">浅</button>
              <button id="depth-medium" type="button">中</button>
              <button id="depth-deep" type="button">深</button>
            </div>
          </div>
        </div>
        <div class="custom-editor" id="custom-editor">
          <div class="custom-editor-card">
            <div class="custom-editor-title" id="custom-editor-title">自定义提示词</div>
            <div class="custom-editor-help" id="custom-editor-help">在这里写下你希望智能问答遵循的语气、结构、重点或限制条件。点击确认后会暂时保存，并在后续提问时优先使用。</div>
            <textarea id="custom-prompt" placeholder="例如：请用学术但通俗的中文回答；先给结论，再分点说明机制；尽量引用 PMID。"></textarea>
          </div>
          <div class="custom-editor-actions">
            <button id="cancel-custom-prompt" class="secondary" type="button">取消</button>
            <button id="confirm-custom-prompt" class="primary" type="button">确认</button>
          </div>
        </div>
        <div class="msgs" id="chat-messages"></div>
        <div class="input"><input id="user-question" type="text" value="LINE-1 相关疾病" placeholder="输入你的问题"><button id="send-question"><i class="fas fa-paper-plane"></i></button></div>
      </div>
    </section>
  </div>
  <footer id="page-footer">演示页使用本地导出的 Neo4j 子图数据，不依赖在线接口。</footer>
  <script src="graph_demo_data.js"></script>
  <script>
    const GRAPH_TUNING = {
      focusZoomStep: 0.01,
      neighborOpacity: 0.88,
      dimmedOpacity: 0.38,
      evidenceNodeRepulsion: 900000,
      diseaseFunctionRepulsion: 700000,
      teNodeRepulsion: 600000,
      paperOuterOffset: 220,
      overlapPadding: 28,
      overlapIterations: 14
    };
    const demoData = window.GRAPH_DEMO_DATA || {elements:[],qa:{}};
    const initialElements = JSON.parse(JSON.stringify(demoData.elements || []));
    const el = id => document.getElementById(id);
    const nodeDetails = el('node-details'), searchInput = el('node-search'), nav = el('search-results-nav'), prevBtn = el('prev-result'), nextBtn = el('next-result'), resultCounter = el('result-counter'), resultName = el('result-name'), chatMessages = el('chat-messages'), userInput = el('user-question'), sendBtn = el('send-question');
    let currentLang = 'zh', currentAnswerStyle = 'simple', currentAnswerDepth = 'shallow', currentCustomPrompt = '', customPromptDraft = '', customEditorOpen = false, previousAnswerStyleBeforeCustom = 'simple', searchResults = [], currentResultIndex = -1, focusLevel = 0, searchDebounceId = null, fixedView = false, currentGraphKind = 'default-tree';
    let terminologyNames = {zh:{}, en:{}}, terminologyNameLookup = {zh:{}, en:{}}, terminologyRelations = {zh:{}, en:{}};
    const ui = {zh:{pageTitle:'转座元件知识图谱演示',badge:'LINE-1 本地图谱子图',graphTitle:'图谱可视化',qaTitle:'智能问答演示',search:'搜索 LINE-1、L1HS、疾病或功能',reset:'重置',footer:'演示页使用本地导出的 Neo4j 子图数据，不依赖在线接口。',empty:'点击节点或连线查看图谱详情。',orig:'原始名称',deg:'连接数',evi:'证据',none:'当前未列出',noneLocal:'当前没有检索到本地证据。',ph:'输入你的问题',q:'LINE-1 相关疾病',intro:'当前演示页已接入本地图谱子图。你可以提问：<br>“LINE-1 相关功能”<br>“LINE-1 相关疾病”<br>“L1HS 和 LINE-1 是什么关系”<br>“哪些文献支持 LINE-1 与阿尔茨海默病相关”',f:'根据当前本地图谱，LINE-1 主要涉及：',d:'根据当前本地图谱，LINE-1 与以下疾病关系较突出：',lp:'当前图谱已为 L1HS 整理出本地文献证据。',pp:'当前图谱已为 LINE-1 整理出本地文献证据。',fallback:'当前演示页支持围绕 LINE-1 的功能、疾病、谱系关系和文献证据查询。',ref:'证据来源',no:'暂无结果。',focus:'聚焦程度',focusHint:'高聚焦会更像手动滚轮放大',fixedOn:'固定视图：开',fixedOff:'固定视图：关',fixedTip:'固定视图已开启：点击节点或连线仅查看详情，不跳转图谱。'},en:{pageTitle:'TE Knowledge Graph Demo',badge:'LINE-1 Local Subgraph',graphTitle:'Graph View',qaTitle:'QA Demo',search:'Search LINE-1, L1HS, diseases, or functions',reset:'Reset',footer:'This demo uses a locally exported Neo4j subgraph and does not depend on online services.',empty:'Click a node or edge to inspect graph details.',orig:'Original name',deg:'Degree',evi:'Evidence',none:'Not listed',noneLocal:'No local evidence was found.',ph:'Ask a question',q:'LINE-1 related diseases',intro:'This demo is grounded on a local graph subnetwork. You can ask:<br>"LINE-1 related functions"<br>"LINE-1 related diseases"<br>"What is the relationship between L1HS and LINE-1?"<br>"What papers support the association between LINE-1 and Alzheimer\'s disease?"',f:'Based on the current local graph, LINE-1 is mainly involved in: ',d:'Based on the current local graph, LINE-1 is notably associated with: ',lp:'The current graph already includes local literature evidence for L1HS.',pp:'The current graph already includes local literature evidence for LINE-1.',fallback:'This demo currently supports LINE-1-centered questions about functions, diseases, lineage relations, and literature evidence.',ref:'Evidence',no:'No results.',focus:'Focus level',focusHint:'Higher focus behaves more like repeated wheel zoom',fixedOn:'Fixed view: On',fixedOff:'Fixed view: Off',fixedTip:'Fixed view is enabled: clicking nodes or edges only shows details without changing the graph.'}}; 
    const typeLabel = {zh:{TE:'转座元件',Disease:'疾病',Function:'功能/机制',Paper:'文献'},en:{TE:'Transposable Element',Disease:'Disease',Function:'Function/Mechanism',Paper:'Paper'}};
    const relLabel = {zh:{SUBFAMILY_OF:'包含','与...相关':'与…相关','不导致':'不导致','促进':'促进','介导':'介导','报道':'报道','影响':'影响','执行':'执行','参与':'参与','调控':'调控'},en:{SUBFAMILY_OF:'contains','与...相关':'associated with','不导致':'does not cause','促进':'promotes','介导':'mediates','报道':'reports','影响':'affects','执行':'executes','参与':'participates in','调控':'regulates'}};
    const nameMap = {zh:{},en:{}};
    const descMap = {zh:{},en:{}};
    let teDescMap = {zh:{}, en:{}};
    let entityDescMap = {
      zh: {Disease:{}, Function:{}},
      en: {Disease:{}, Function:{}}
    };
    const DISPLAY_NAME_OVERRIDES = {
      zh: {'L1':'LINE1','LINE-1':'LINE1'},
      en: {'L1':'LINE1','LINE-1':'LINE1'}
    };
    const getTypeColor = t => ({TE:'#2563eb',Disease:'#ef4444',Function:'#10b981',Paper:'#f59e0b'}[t] || '#94a3b8');
    function containsChinese(text){return /[\u4e00-\u9fff]/.test(text || '');}
    function getType(type){return (typeLabel[currentLang] && typeLabel[currentLang][type]) || type;}
    function rebuildTerminologyIndexes(){
      terminologyNameLookup = {zh:{}, en:{}};
      ['zh','en'].forEach(lang=>{
        const source = terminologyNames[lang] || {};
        Object.keys(source).forEach(key=>{
          terminologyNameLookup[lang][key] = source[key];
          terminologyNameLookup[lang][String(key).toLowerCase()] = source[key];
        });
      });
    }
    function mergeTerminology(payload){
      if(!payload || typeof payload !== 'object') return;
      ['zh','en'].forEach(lang=>{
        terminologyNames[lang] = Object.assign({}, terminologyNames[lang] || {}, payload.names?.[lang] || {});
        terminologyRelations[lang] = Object.assign({}, terminologyRelations[lang] || {}, payload.relations?.[lang] || {});
      });
      rebuildTerminologyIndexes();
    }
    async function loadTerminology(){
      try{
        const res = await fetch(`terminology/te_terminology.json?v=${Date.now()}`, {cache:'no-store'});
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        mergeTerminology(payload);
      }catch(err){
        console.warn('Failed to load terminology table:', err);
      }
      try{
        const overrideRes = await fetch(`terminology/te_terminology_overrides.json?v=${Date.now()}`, {cache:'no-store'});
        if(!overrideRes.ok) throw new Error(`HTTP ${overrideRes.status}`);
        const overridePayload = await overrideRes.json();
        mergeTerminology(overridePayload);
      }catch(err){
        console.warn('Failed to load terminology override table:', err);
      }
    }
    async function loadTeDescriptions(){
      try{
        const res = await fetch(`data/processed/te_descriptions.json?v=${Date.now()}`, {cache:'no-store'});
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        teDescMap = {
          zh: Object.assign({}, payload?.zh || {}),
          en: Object.assign({}, payload?.en || {})
        };
      }catch(err){
        console.warn('Failed to load TE descriptions:', err);
        teDescMap = {zh:{}, en:{}};
      }
    }
    async function loadEntityDescriptions(){
      try{
        const res = await fetch(`data/processed/entity_descriptions.json?v=${Date.now()}`, {cache:'no-store'});
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        entityDescMap = {
          zh: {
            Disease: Object.assign({}, payload?.zh?.Disease || {}),
            Function: Object.assign({}, payload?.zh?.Function || {})
          },
          en: {
            Disease: Object.assign({}, payload?.en?.Disease || {}),
            Function: Object.assign({}, payload?.en?.Function || {})
          }
        };
      }catch(err){
        console.warn('Failed to load entity descriptions:', err);
        entityDescMap = {zh:{Disease:{}, Function:{}}, en:{Disease:{}, Function:{}}};
      }
    }
    function getDisplayNameKey(name=''){
      if(!name) return '';
      return DISPLAY_NAME_OVERRIDES[currentLang]?.[name] || DISPLAY_NAME_OVERRIDES.en?.[name] || name;
    }
    function lookupMappedName(name=''){
      if(!name) return '';
      const displayKey = getDisplayNameKey(name);
      return terminologyNameLookup[currentLang][displayKey] || terminologyNameLookup[currentLang][String(displayKey).toLowerCase()] || nameMap[currentLang][displayKey] || '';
    }
    function lookupMappedRelation(rel=''){
      if(!rel) return '';
      return terminologyRelations[currentLang][rel] || relLabel[currentLang][rel] || rel;
    }
    function getRel(rel){return lookupMappedRelation(rel);}
    function getPaperDisplayName(name, pmid=''){
      const mapped = lookupMappedName(name);
      if(mapped) return mapped;
      if(currentLang==='zh') return pmid ? `文献 PMID:${pmid}` : '文献节点';
      if(containsChinese(name)) return pmid ? `Paper PMID:${pmid}` : 'Paper node';
      return name;
    }
    function getName(name,type,description='',pmid=''){
      const mapped = lookupMappedName(name);
      if(mapped) return mapped;
      if(type==='Paper') return getPaperDisplayName(name, pmid);
      if(currentLang==='en' && containsChinese(name)) return `${getType(type)} node`;
      return name;
    }
    const inferType = name => {
      const current = cy.nodes().filter(n => n.data('label') === name)[0];
      if(current) return current.data('type') || 'Unknown';
      return ((demoData.elements.find(x => x.data && x.data.label === name && !x.data.source) || {}).data || {}).type || 'Unknown';
    };
    function isBrokenDescription(text=''){
      const value = String(text || '').trim();
      if(!value) return true;
      if(/^\?+$/.test(value)) return true;
      if((value.match(/\?/g)||[]).length >= 4) return true;
      if(/[\u9500\u951b\u956f\u95ba\u95c2\u95b8\u95b7\u7487\u9391]/.test(value)) return true;
      return false;
    }
    function isTreeImportDescription(text=''){
      const value = String(text || '').trim();
      if(!value) return false;
      return /imported from tree\.txt|lineage node imported|lineage reference|original label:/i.test(value);
    }
    function getTeDesc(name, description=''){
      const key = String(getDisplayNameKey(name) || '').trim();
      const mapped = teDescMap[currentLang] && teDescMap[currentLang][key] ? String(teDescMap[currentLang][key]).trim() : '';
      if(mapped && !isBrokenDescription(mapped)) return mapped;
      if(currentLang==='en'){
        const rawDesc = String(description || '').trim();
        if(rawDesc && !isBrokenDescription(rawDesc) && !isTreeImportDescription(rawDesc)) return rawDesc;
      }
      if(currentLang==='zh'){
        return `${getName(name,'TE')} 是当前知识图谱中的转座元件节点。当前页面主要展示它在 TE 谱系结构以及相关机制、疾病和文献证据中的位置。`;
      }
      return `${getName(name,'TE')} is a transposable element node in the current knowledge graph. The current page mainly shows its position within TE lineage structure and related mechanism, disease, and literature evidence.`;
    }
    function getEntityDesc(name,type,description=''){
      const key = String(name || '').trim();
      const mapped = entityDescMap[currentLang]?.[type]?.[key] ? String(entityDescMap[currentLang][type][key]).trim() : '';
      if(mapped && !isBrokenDescription(mapped)) return mapped;
      if(currentLang==='en'){
        const rawDesc = String(description || '').trim();
        if(rawDesc && !isBrokenDescription(rawDesc)) return rawDesc;
      }
      return '';
    }
    function buildDefaultDesc(name,type,pmid=''){

            const boxA=a.boundingBox({includeLabels:true, includeOverlays:false});

            const overlapY=Math.min(boxA.y2,boxB.y2)-Math.max(boxA.y1,boxB.y1);

      const buildDetailed=(title, items, refs, limitItems=8, limitRefs=8)=>{
        const bulletLines=(items||[]).slice(0,limitItems).map(i=>`- ${getRel(i.predicate)} ${getName(i.name, inferType(i.name))}`).join('\n') || (currentLang==='zh' ? '- 当前未检索到可展开的本地结构化记录。' : '- No expandable local structured records were found.');
        const refLines=(refs||[]).slice(0,limitRefs).map(formatRef).join('\n') || (currentLang==='zh' ? '当前暂无本地参考文献。' : 'No local references are currently available.');
        if(currentLang==='zh'){
          return `${intro}## 结论\n${title}\n\n## 机制与关系解释\n${bulletLines}\n\n## 证据与文献\n${refLines}\n\n## 局限与说明\n- 当前结果来自本地图谱子图，完整答案仍以后端知识检索为准。\n- 若动态图谱未完全展开，部分关系可能未显示在当前页面。`;
        }
        return `${intro}## Conclusion\n${title}\n\n## Mechanistic Interpretation\n${bulletLines}\n\n## Evidence and References\n${refLines}\n\n## Limitations\n- This local answer is based on the demo subgraph rather than the full backend retrieval pipeline.\n- Some relations may remain hidden when the current graph fragment is incomplete.`;
      };
      const buildSimple=(lead, items, refs, limitItems=5, limitRefs=5)=>{
        const body=(items||[]).slice(0,limitItems).map(i=>`${getRel(i.predicate)} ${getName(i.name, inferType(i.name))}`).join(currentLang==='zh'?'；':'; ');
        const refsHtml=makeRef((refs||[]).slice(0,limitRefs));
        return `${intro}${lead}${body || ui[currentLang].no}${refsHtml}`;
      };

      if(asksRelation){
        const refs=demoData.qa.l1hs_papers || [];
        if(currentAnswerStyle==='detailed'){
          return currentLang==='zh'
            ? `${intro}## 结论\nL1HS 是 LINE-1 谱系中的一个更细粒度节点，当前本地图谱把它作为具体分支来展示。\n\n## 机制与关系解释\n- L1HS 通过 SUBFAMILY_OF 关系连接到 LINE-1。\n- 这种关系属于分类或谱系层级关系，而不是疾病或功能作用关系。\n- 保留更细粒度的层级有助于区分总家族与具体活跃分支。\n\n## 证据与文献\n${refs.slice(0,6).map(formatRef).join('\n') || '当前暂无本地参考文献。'}\n\n## 局限与说明\n- 当前页面优先展示局部子图，更多邻域需要继续展开。\n- 更完整的证据应以后端 Neo4j 检索和问答结果为准。`
            : `${intro}## Conclusion\nL1HS is modeled as a finer-grained node within the LINE-1 lineage.\n\n## Mechanistic Interpretation\n- L1HS is connected to LINE-1 through a SUBFAMILY_OF relation.\n- This is a lineage or classification relation rather than a disease or mechanism relation.\n- Keeping finer-grained hierarchy helps distinguish the broader lineage from specific active branches.\n\n## Evidence and References\n${refs.slice(0,6).map(formatRef).join('\n') || 'No local references are currently available.'}\n\n## Limitations\n- The current page emphasizes a local subgraph rather than the full graph.\n- Full evidence should be checked through the backend retrieval pipeline.`;
        }
        return `${intro}${currentLang==='zh' ? 'L1HS 与 LINE-1 的关系属于同一谱系中的层级关系。' : 'L1HS is connected to LINE-1 through a hierarchical relation within the same lineage.'}${makeRef(refs.slice(0,4))}`;
      }

      if(asksLine1 && asksFunction){
        const items=demoData.qa.line1_functions || [];
        return currentAnswerStyle==='detailed'
          ? buildDetailed(currentLang==='zh' ? '根据当前本地图谱，LINE-1 相关功能主要涉及逆转录转座、序列转导、插入突变及与其他转座元件协同的过程。' : 'According to the current local graph, LINE-1-related functions mainly involve retrotransposition, sequence transduction, insertional mutagenesis, and interactions with other transposable elements.', items, items)
          : buildSimple(ui[currentLang].f, items, items);
      }

      if(asksLine1 && asksDisease){
        const items=demoData.qa.line1_diseases || [];
        return currentAnswerStyle==='detailed'
          ? buildDetailed(currentLang==='zh' ? '根据当前本地图谱，LINE-1 与多种神经系统疾病、遗传综合征及肿瘤相关疾病存在结构化关联。' : 'According to the current local graph, LINE-1 shows structured associations with multiple neurological diseases, genetic syndromes, and cancers.', items, items)
          : buildSimple(ui[currentLang].d, items, items);
      }

      if(lower.includes('l1hs') && asksPaper){
        const refs=demoData.qa.l1hs_papers || [];
        return currentAnswerStyle==='detailed'
          ? buildDetailed(currentLang==='zh' ? '当前本地图谱已经整理出与 L1HS 相关的文献证据，可用于支撑谱系、功能或疾病关系的解释。':'The current local graph already contains literature evidence associated with L1HS.', refs, refs, 6, 8)
          : `${intro}${ui[currentLang].lp}${makeRef(refs.slice(0,5))}`;
      }

      if(asksLine1 && asksPaper){
        const refs=demoData.qa.line1_papers || [];
        return currentAnswerStyle==='detailed'
          ? buildDetailed(currentLang==='zh' ? '当前本地图谱已经整理出与 LINE-1 相关的核心文献，可用于支撑疾病、功能和谱系层面的解释。':'The current local graph already contains core literature evidence associated with LINE-1.', refs, refs, 6, 8)
          : `${intro}${ui[currentLang].pp}${makeRef(refs.slice(0,5))}`;
      }

      return currentAnswerStyle==='detailed'
        ? (currentLang==='zh'
          ? `${intro}## 结论\n当前本地演示图支持围绕 LINE-1 的疾病、功能、谱系关系与文献证据问答。\n\n## 机制与关系解释\n- 你可以直接询问“LINE-1 相关疾病”“LINE-1 相关功能”。\n- 也可以询问“L1HS 和 LINE-1 是什么关系”。\n- 若需要证据，可继续追问文献支持情况。\n\n## 证据与文献\n当前回答来自本地演示图；更完整答案以后端知识检索与大模型生成结果为准。\n\n## 局限与说明\n- 这是本地回退回答，不代表完整数据库检索结果。\n- 当后端恢复后，详细模式会返回更完整的证据化回答。`
          : `${intro}## Conclusion\nThe current local demo graph supports questions about LINE-1 diseases, functions, lineage relations, and literature evidence.\n\n## Mechanistic Interpretation\n- You can ask about LINE-1-related diseases or functions.\n- You can also ask how L1HS is related to LINE-1.\n- Literature evidence can be expanded when needed.\n\n## Evidence and References\nThis answer comes from the local demo graph; the full backend retrieval pipeline can provide richer evidence.\n\n## Limitations\n- This is a local fallback answer rather than the full retrieval result.\n- Detailed mode becomes richer when backend retrieval succeeds.`)
        : `${intro}${ui[currentLang].fallback}`;
    }
    function formatBackendAnswer(result){
      const styleLabel=currentLang==='zh'
        ? (currentAnswerStyle==='custom'?'自定义模式':result.answer_style==='detailed'?'详细模式':'简单模式')
        : (currentAnswerStyle==='custom'?'Custom mode':result.answer_style==='detailed'?'Detailed mode':'Brief mode');
      const depthLabel=currentLang==='zh'
        ? ({shallow:'浅',medium:'中',deep:'深'}[result.answer_depth] || '浅')
        : ({shallow:'Shallow',medium:'Medium',deep:'Deep'}[result.answer_depth] || 'Shallow');
      const prefix = currentLang==='zh'
        ? `> ${styleLabel} · 回答深度：${depthLabel}\n\n`
        : `> ${styleLabel} · Depth: ${depthLabel}\n\n`;
      return `${prefix}${result.answer||ui[currentLang].fallback}`;
    }
    function applyAnswerGraph(result, question=''){
      const graph = result && result.graph_context;
      if(!graph || !Array.isArray(graph.elements) || graph.elements.length===0) return false;
      const anchorName = graph.anchor && graph.anchor.name ? graph.anchor.name : (question || '');
      applyGraphElements(graph.elements, anchorName, {graphKind:'dynamic'});
      searchInput.value = anchorName || '';
      nodeDetails.textContent = currentLang==='zh'
        ? '左侧图谱已同步为本次回答使用的局部知识子图。'
        : 'The graph on the left has been synchronized to the local subgraph used for this answer.';
      return true;
    }
    async function answerWithBackend(question){
      const effectiveQuestion = buildEffectiveQuestion(question);
      const customPrompt = currentCustomPrompt;
      const effectiveStyle = currentAnswerStyle==='custom' ? 'custom' : currentAnswerStyle;
      const res=await fetch('api/qa.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:effectiveQuestion,language:currentLang,answer_style:effectiveStyle,answer_depth:currentAnswerDepth,custom_prompt:customPrompt})});
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||'Backend request failed');
      return {text: formatBackendAnswer(data), result: data};
    }
    cy.on('tap','node',async e => {
      const node = e.target;
      if(fixedView){
        clearHighlights();
        showNode(node);
        return;
      }
      try{
        await loadDynamicGraph(node.data('pmid') || node.data('query_label') || node.data('label'));
      }catch(_err){
        focus(node);
      }
    }); cy.on('tap','edge',e => {
      clearHighlights();
      const edge=e.target;
      if(!fixedView){
        const connected=edge.connectedNodes();
        const others=cy.nodes().difference(connected);
        const otherEdges=cy.edges().difference(edge);
        others.addClass('dimmed');
        otherEdges.addClass('edge-dimmed');
        connected.addClass('neighbor');
        edge.addClass('focus-edge');
      }
      showEdge(edge)
    }); cy.on('tap',e => { if(e.target===cy){clearHighlights(); nodeDetails.textContent=ui[currentLang].empty;} });
    searchInput.addEventListener('input', handleSearch); searchInput.addEventListener('keydown',async e=>{if(e.key==='Enter'){e.preventDefault(); try{await loadDynamicGraph(searchInput.value.trim());}catch(err){nodeDetails.textContent = err && err.message ? err.message : ui[currentLang].empty;}}}); prevBtn.addEventListener('click',()=>{if(currentResultIndex>0){currentResultIndex-=1; updateNav();}}); nextBtn.addEventListener('click',()=>{if(currentResultIndex<searchResults.length-1){currentResultIndex+=1; updateNav();}}); el('focus-level').addEventListener('input',e=>{focusLevel=Number(e.target.value)||0; updateFocusUi(); if(searchResults.length>0&&searchResults[currentResultIndex]) focus(searchResults[currentResultIndex]);});
    el('reset-graph').addEventListener('click',()=>{restoreInitialGraph();});
    el('toggle-fixed-view').addEventListener('click',()=>{
      fixedView = !fixedView;
      updateFixedViewUi();
      nodeDetails.textContent = fixedView ? ui[currentLang].fixedTip : ui[currentLang].empty;
    });
    sendBtn.addEventListener('click',async()=>{const q=userInput.value.trim(); if(!q) return; addMessage(q,'user'); userInput.value=''; const loading=addMessage(currentLang==='zh'?'正在检索图数据库并生成回答…':'Retrieving graph evidence and generating the answer…','assistant'); try{const backend=await answerWithBackend(q); loading.remove(); addMessage(backend.text,'assistant'); applyAnswerGraph(backend.result, q);}catch(err){loading.remove(); const prefix=currentLang==='zh'?'后端暂未连通，当前已回退到本地规则回答。<div class="ref">':'Backend unavailable. The UI has fallen back to local rule-based answering.<div class="ref">'; const suffix=`${err && err.message ? err.message : 'unknown error'}</div>`; setTimeout(()=>addMessage(prefix + suffix + answerLocal(q),'assistant'),120);}});
    userInput.addEventListener('keypress',e => { if(e.key==='Enter') sendBtn.click(); });
    document.addEventListener('click',e => {
      if(!e.target) return;
      if(e.target.id==='mode-simple') setAnswerStyle('simple');
      if(e.target.id==='mode-detailed') setAnswerStyle('detailed');
      if(e.target.id==='mode-custom') openCustomPromptEditor();
      if(e.target.id==='confirm-custom-prompt') closeCustomPromptEditor({save:true});
      if(e.target.id==='cancel-custom-prompt'){
        customPromptDraft = currentCustomPrompt || '';
        closeCustomPromptEditor({save:false});
      }
      if(e.target.id==='depth-shallow') setAnswerDepth('shallow');
      if(e.target.id==='depth-medium') setAnswerDepth('medium');
      if(e.target.id==='depth-deep') setAnswerDepth('deep');
    });
    el('lang-zh').addEventListener('click',()=>{currentLang='zh'; setUi();}); el('lang-en').addEventListener('click',()=>{currentLang='en'; setUi();});
    cy.on('layoutstop',()=>{if(currentGraphKind!=='default-tree') refineGraphLayout(); cy.fit(undefined,55);});
    async function initializePage(){
      await loadTerminology();
      await loadTeDescriptions();
      await loadEntityDescriptions();
      repairModeControls();
      setAnswerStyle('simple');
      setUi();
      el('focus-level').value=String(focusLevel);
      restoreInitialGraph();
    }
    initializePage();
  </script>
</body>
</html>
