<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEKG G6 Workspace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/index_demo.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@antv/g6@5/dist/g6.min.js"></script>
  <style>
    .g6-surface-stack {
      position: relative;
      flex: 1;
      min-height: 0;
      background: radial-gradient(circle at top, #fff, #f6faff);
    }

    .g6-surface-stack #g6-default-tree-surface,
    .g6-surface-stack #g6-dynamic-surface {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .g6-surface-stack #g6-dynamic-surface {
      display: none;
    }

    .g6-surface-stack #g6-dynamic-surface iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: radial-gradient(circle at top, #fff, #f6faff);
    }

    body.tekg-g6-preview-ready .main {
      grid-template-columns: minmax(0, 1fr);
    }

    body.tekg-g6-preview-ready .main > .panel:last-child,
    body.tekg-g6-preview-ready .focus-legacy,
    body.tekg-g6-preview-ready .non-key-legacy {
      display: none !important;
    }
  </style>
</head>
<body>
  <header>
    <i class="fas fa-dna" style="font-size:2rem;color:#2563eb"></i>
    <h1 id="page-title">TEKG G6 Workspace</h1>
    <div class="actions">
      <span class="badge" id="page-badge">Independent G6 entry</span>
      <div class="lang">
        <button id="lang-zh" type="button">中文</button>
        <button id="lang-en" type="button" class="active">English</button>
      </div>
    </div>
  </header>
  <div class="main">
    <section class="panel">
      <div class="head">
        <h2 id="graph-title">G6 Graph Workspace</h2>
      </div>
      <div class="toolbar">
        <div class="search">
          <i class="fas fa-search" style="color:#64748b"></i>
          <input id="node-search" type="text" placeholder="Search LINE1, L1HS, disease, or function">
        </div>
        <button id="toggle-focus-view" class="focus-legacy" type="button" style="display:none">
          <span id="focus-view-text">Focus mode: Global</span>
        </button>
        <div class="stepper-control" id="key-node-level-control">
          <button id="decrease-key-node-level" type="button" aria-label="Decrease key-node level">-</button>
          <span id="key-node-level-text">Key-node level: 1</span>
          <button id="increase-key-node-level" type="button" aria-label="Increase key-node level">+</button>
        </div>
        <button id="toggle-non-key-nodes" class="non-key-legacy" type="button" style="display:none">
          <span id="non-key-nodes-text">Hide non-key nodes: Off</span>
        </button>
        <button id="toggle-fixed-view" type="button"><span id="fixed-view-text">Fixed view: Off</span></button>
        <button id="reset-graph" type="button"><i class="fas fa-sync-alt"></i> <span id="reset-text">Reset</span></button>
      </div>
      <div class="g6-surface-stack">
        <div id="cy" style="display:none"></div>
        <div id="g6-default-tree-surface"></div>
        <div id="g6-dynamic-surface"></div>
      </div>
      <div class="nav" id="search-results-nav" style="display:none">
        <button id="prev-result" type="button"><i class="fas fa-chevron-left"></i></button>
        <span id="result-counter">0/0</span>
        <span id="result-name"></span>
        <button id="next-result" type="button"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="detail" id="node-details">Preparing G6 workspace...</div>
    </section>
    <section class="panel">
      <div class="head"><h2 id="qa-title">Interactive QA Demo</h2></div>
      <div class="chat">
        <div class="qa-controls">
          <div class="qa-mode">
            <span class="qa-mode-label">QA is temporarily disabled in G6 mode.</span>
          </div>
        </div>
        <div class="msgs" id="chat-messages"></div>
        <div class="input">
          <input type="text" value="" placeholder="QA will return later" disabled>
          <button type="button" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const __tekgG6Url = new URL(window.location.href);
    const __tekgEmbedMode = __tekgG6Url.searchParams.get('embed') || '';
    const __tekgInitialQuery = __tekgG6Url.searchParams.get('q') || '';
    if (__tekgG6Url.searchParams.get('renderer') !== 'g6') {
      __tekgG6Url.searchParams.set('renderer', 'g6');
      window.history.replaceState({}, '', __tekgG6Url.toString());
    }
    window.__TEKG_RENDERER_MODE = 'g6';
    window.__TEKG_EMBED_MODE = __tekgEmbedMode;
    window.__TEKG_INITIAL_QUERY = __tekgInitialQuery;
  </script>
  <script src="graph_demo_data.js"></script>
  <script src="assets/js/index_demo.data.js"></script>
  <script src="assets/js/renderers/g6/default-tree.js"></script>
  <script src="assets/js/renderers/g6/index-g6-runtime.js"></script>
  <script src="assets/js/renderers/g6/index-g6.bootstrap.js"></script>
</body>
</html>
