<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEKG G6 Prevent-Overlap Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@antv/g6@5/dist/g6.min.js"></script>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f6f8fc;
      color: #1f2b46;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #dbe5f1;
      border-radius: 20px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .toolbar .meta {
      color: #5f7392;
      font-size: 14px;
    }

    .toolbar .grow {
      flex: 1 1 auto;
    }

    .toolbar input {
      width: 220px;
      max-width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid #cad8ec;
      border-radius: 999px;
      font-size: 15px;
    }

    .toolbar button {
      height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: #4e79ff;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .status {
      padding: 0 20px 16px;
      color: #5f7392;
      font-size: 14px;
    }

    #container {
      width: 100%;
      height: calc(100vh - 190px);
      min-height: 620px;
      border-top: 1px solid #e6edf7;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="toolbar">
        <div>
          <h1>G6 Prevent-Overlap Test</h1>
          <div class="meta">Official example skeleton + TEKG data only</div>
        </div>
        <div class="grow"></div>
        <input id="query-input" type="text" value="LINE1" aria-label="Query">
        <button id="load-btn" type="button">Load One-Hop Graph</button>
      </div>
      <div class="status" id="status">Ready.</div>
      <div id="container"></div>
    </section>
  </div>
  <script src="assets/js/renderers/g6/index-g6-test.js"></script>
</body>
</html>
